{{ save.available_decisions|json_script:"decisions-data" }}

<div id="chat-interface" class="card shadow-lg border-0 d-none position-fixed top-50 start-50 translate-middle" style="width: 80vw; max-width: 800px; height: 70vh; max-height: 800px; z-index: 1050; display: flex; flex-direction: column;">
    <div class="card-header bg-primary text-white d-flex align-items-center py-3">
        <button class="btn btn-sm text-white border-0 p-0 me-3 fs-5" onclick="backToMenu()">←</button>
        <h5 class="mb-0 fw-bold" id="chat-title">Message</h5>
    </div>
    <div class="card-body bg-light d-flex flex-column p-0">
        <div class="p-4 bg-white shadow-sm fs-5 text-secondary overflow-auto flex-grow-1" id="chat-body">
        </div>
        <div id="chat-responses" class="p-4 bg-light border-top d-flex justify-content-end gap-3 flex-wrap">
        </div>
    </div>
</div>

<div id="messaging-menu" class="card shadow-lg border-0 d-none position-fixed top-50 start-50 translate-middle" style="width: 80vw; max-width: 800px; height: 70vh; max-height: 800px; z-index: 1050; display: flex; flex-direction: column;">
    <div class="card-header bg-primary text-white py-3 fs-5 fw-bold d-flex justify-content-between align-items-center">
        <span>Messages</span>
        <span class="badge bg-white text-primary fs-6" id="menu-count">{{ save.available_decisions|length }}</span>
    </div>
    <div class="list-group list-group-flush fs-5 overflow-auto flex-grow-1" id="decision-list-container">
        {% for d in save.available_decisions %}
            <button class="list-group-item list-group-item-action py-3 px-4 border-0 border-bottom" 
                    onclick="initiateChat({{ d.id }})">
                {{ d.title }}
            </button>
        {% empty %}
            <div class="p-5 text-center text-muted">All caught up!</div>
        {% endfor %}
    </div>
</div>

<div class="d-flex justify-content-end mt-auto">
    <button class="btn btn-outline-primary shadow-lg rounded-circle d-flex align-items-center justify-content-center position-relative" 
            style="width: 84px; height: 84px; font-size: 1.5rem; background-color: white;" 
            onclick="toggleWidget()">
        <span id="widget-icon"><i class="bi bi-chat-right-dots"></i></span>
        {% if save.available_decisions %}
        <span id="global-badge" 
            class="position-absolute translate-middle" 
            style="
                top: 0; 
                left: 100%; 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                min-width: 18px; 
                height: 18px; 
                padding: 2px; 
                font-size: 0.65rem; 
                font-weight: bold; 
                color: white; 
                background-color: red; 
                border-radius: 50%; 
                line-height: 1;
                z-index: 10;">
            {{ save.available_decisions|length }}
        </span>
        {% endif %}
    </button>
</div>
