<div class="d-flex flex-wrap gap-2">
    {% if task.get_assignees %}
        {% for sc in task.get_assignees %}
            <div class="badge rounded-pill d-flex align-items-center p-2"
                style="border: 1px solid var(--border-subtle); color: var(--text-primary);">
                <span class="me-2">{{ sc.character.first_name }} {{ sc.character.last_name }}</span>
                {% if not sc.lock_task %}
                <button type="button" 
                        class="btn-close btn-close-black remove-assignee-btn" 
                        style="font-size: 0.5rem;"
                        data-savecharacterid="{{ sc.id }}"
                        aria-label="Remove">
                </button>
                {% endif %}
            </div>
        {% endfor %}
    {% else %}
            <div class="badge rounded-pill d-flex align-items-center p-2" 
                 style="border: 1px solid rgba(0,0,0,0);">
                <span class="me-2">Unassigned</span>
            </div>
    {% endif %}
</div>
