[pytest]
# Tells pytest where your Django settings are
DJANGO_SETTINGS_MODULE = project.settings

# Tells pytest where to look for your tests
testpaths = projectManagerSim/tests projectManagerSim/tests_frontend

# Recognizes these file patterns as test files
python_files = tests.py test_*.py *_tests.py

# Register custom markers
markers =
    frontend: marks tests as frontend browser tests (requires Chrome)
    slow: marks tests as slow running

# addopts = "Additional Options"
# These flags are automatically added every time you type 'pytest'
# --cov=projectManagerSim : Only measure your app's code (ignores venv/logs)
# --cov-report=html       : Generates the 'htmlcov' folder automatically
# -v                       : Verbose (shows the name of each test as it runs)
# --tb=short            : Keeps the terminal/summary output clean
# --html=report.html    : The "Large" detailed report (view in browser)
# --self-contained-html : Makes the HTML file easy to share
addopts = --cov=projectManagerSim --cov-report=html -v --tb=short --html=report.html --self-contained-html

filterwarnings =
    ignore:No directory at.*staticfiles:UserWarning
    ignore:DatabaseWrapper objects created in a thread:pytest.PytestUnhandledThreadExceptionWarning
    ignore:unclosed <socket.socket:ResourceWarning